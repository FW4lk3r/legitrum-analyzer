name: Dependency Audit

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1' # Weekly on Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  composer-audit:
    name: Composer Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run composer audit
        run: composer audit --format=plain
        continue-on-error: false

      - name: Run composer audit (JSON for artifacts)
        if: always()
        run: composer audit --format=json > audit-results.json || true

      - name: Audit summary
        if: always()
        run: |
          echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Composer" >> $GITHUB_STEP_SUMMARY
          if [ -f audit-results.json ]; then
            ADVISORIES=$(jq '.advisories | length' audit-results.json 2>/dev/null || echo "unknown")
            echo "- Advisories found: **${ADVISORIES}**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Audit results not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ecosystem Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Composer (PHP)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] npm/yarn — not applicable (no package.json)" >> $GITHUB_STEP_SUMMARY

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit-results
          path: audit-results.json
          retention-days: 30

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies (with dev)
        run: composer install --optimize-autoloader

      - name: Generate CycloneDX SBOM
        run: composer sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
